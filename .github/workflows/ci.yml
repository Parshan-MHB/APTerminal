name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift Version
        run: swift --version

      - name: Run Package Tests
        run: swift test
