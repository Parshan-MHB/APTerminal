name: APTerminal
options:
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: "$(TARGET_NAME)"
targets:
  APTerminalProtocol:
    type: framework
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/APTerminalProtocol
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.protocol
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  APTerminalProtocolCodec:
    type: framework
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/APTerminalProtocolCodec
    dependencies:
      - target: APTerminalProtocol
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.protocolcodec
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  APTerminalSecurity:
    type: framework
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/APTerminalSecurity
    dependencies:
      - target: APTerminalProtocol
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.security
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  APTerminalPTY:
    type: framework
    platform: macOS
    sources:
      - path: Sources/APTerminalPTY
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.pty
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  APTerminalCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/APTerminalCore
    dependencies:
      - target: APTerminalProtocol
      - target: APTerminalPTY
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.core
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  APTerminalTransport:
    type: framework
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/APTerminalTransport
    dependencies:
      - target: APTerminalProtocol
      - target: APTerminalProtocolCodec
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.transport
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  APTerminalHost:
    type: framework
    platform: macOS
    sources:
      - path: Sources/APTerminalHost
    dependencies:
      - target: APTerminalCore
      - target: APTerminalProtocol
      - target: APTerminalProtocolCodec
      - target: APTerminalSecurity
      - target: APTerminalTransport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.host
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  APTerminalClient:
    type: framework
    platform: iOS
    sources:
      - path: Sources/APTerminalClient
    dependencies:
      - target: APTerminalProtocol
      - target: APTerminalProtocolCodec
      - target: APTerminalSecurity
      - target: APTerminalTransport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.framework.client
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        MACH_O_TYPE: mh_dylib
  MacCompanion:
    type: application
    platform: macOS
    sources:
      - path: apps/mac-companion/Sources
      - path: apps/mac-companion/Support
    settings:
      base:
        PRODUCT_NAME: APTerminal
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.mac
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: APTerminal
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSAppleEventsUsageDescription: APTerminal needs Automation access to read existing Terminal and iTerm windows that you choose to expose on your phone.
        INFOPLIST_KEY_NSBonjourServices:
          - _tcomp._tcp
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Discover and connect trusted APTerminal clients on the local network.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: APTerminalCore
      - target: APTerminalHost
      - target: APTerminalProtocol
      - target: APTerminalProtocolCodec
      - target: APTerminalSecurity
      - target: APTerminalTransport
      - target: APTerminalPTY
  iOSClient:
    type: application
    platform: iOS
    sources:
      - path: apps/ios-client/Sources
      - path: apps/ios-client/Support
    settings:
      base:
        PRODUCT_NAME: APTerminal
        PRODUCT_BUNDLE_IDENTIFIER: com.apterminal.ios
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: apps/ios-client/Support/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: APTerminalClient
      - target: APTerminalProtocol
      - target: APTerminalProtocolCodec
      - target: APTerminalSecurity
      - target: APTerminalTransport
schemes:
  APTerminalProtocol:
    build:
      targets:
        APTerminalProtocol: all
  APTerminalCore:
    build:
      targets:
        APTerminalCore: all
  APTerminalHost:
    build:
      targets:
        APTerminalHost: all
  APTerminalClient:
    build:
      targets:
        APTerminalClient: all
  MacCompanion:
    build:
      targets:
        MacCompanion: all
    run:
      config: Debug
    archive:
      config: Release
  iOSClient:
    build:
      targets:
        iOSClient: all
    run:
      config: Debug
    archive:
      config: Release
